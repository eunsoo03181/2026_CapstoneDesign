<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<title>Signal Catch — 면접 기록</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" as="style" crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>body{font-family:'Pretendard Variable',system-ui,sans-serif}</style>
<script src="/static/admin_chrome.js?v=board" defer></script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">

<header class="bg-white border-b border-slate-200 sticky top-0 z-10">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center" aria-label="Signal Catch"><svg viewBox="0 0 32 32" class="w-5 h-5" fill="none" aria-hidden="true"><path d="M 5 15 Q 16 0 27 15" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" stroke-linecap="round" fill="none"/><path d="M 9 18 Q 16 9 23 18" stroke="rgba(255,255,255,0.9)" stroke-width="2.4" stroke-linecap="round" fill="none"/><circle cx="16" cy="21" r="2.6" fill="#ffffff"/></svg></div>
      <h1 class="text-lg font-bold tracking-tight">Signal Catch
        <span class="text-slate-400 font-normal text-sm">면접 기록</span>
      </h1>
    </a>
    <nav class="flex items-center gap-5 text-sm">
      <a href="/" class="text-slate-600 hover:text-slate-900">새 면접</a>
      <a href="/history" class="font-semibold text-indigo-600">면접 기록</a>
      <a href="/board" class="text-slate-600 hover:text-slate-900">공유 게시판</a>
      <button id="logoutBtn" class="text-slate-500 hover:text-rose-600 transition">로그아웃</button>
    </nav>
  </div>
</header>

<main class="max-w-5xl mx-auto px-6 py-10">
  <div class="flex items-end justify-between mb-6">
    <div>
      <h2 class="text-2xl font-bold">내 면접 기록</h2>
      <p class="text-sm text-slate-500 mt-1">지난 면접을 확인할 수 있어요.</p>
    </div>
    <a href="/" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-semibold transition">+ 새 면접 시작</a>
  </div>

  <div id="loading" class="text-center py-20 text-slate-400 text-sm">불러오는 중...</div>

  <div id="emptyState" class="hidden text-center py-20">
    <svg class="w-12 h-12 mx-auto text-slate-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
    </svg>
    <p class="text-slate-500 text-sm">아직 진행한 면접이 없어요.</p>
    <a href="/" class="mt-4 inline-block px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-semibold">첫 면접 시작하기</a>
  </div>

  <ul id="sessionList" class="hidden space-y-3"></ul>
</main>

<script>
const $ = (id) => document.getElementById(id);

$('logoutBtn').addEventListener('click', async () => {
  await fetch('/auth/logout', {method:'POST'});
  location.href = '/login';
});

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function formatDate(s) {
  if (!s) return '-';
  const d = new Date(s);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${yyyy}.${mm}.${dd} ${hh}:${mi}`;
}

function scoreColor(score, max = 100) {
  if (score == null) return 'bg-slate-100 text-slate-500';
  const pct = (score / max) * 100;
  if (pct >= 80) return 'bg-emerald-100 text-emerald-700';
  if (pct >= 60) return 'bg-indigo-100 text-indigo-700';
  if (pct >= 40) return 'bg-amber-100 text-amber-700';
  return 'bg-rose-100 text-rose-700';
}

async function load() {
  try {
    const res = await fetch('/api/sessions');
    if (res.status === 401) { location.href = '/login'; return; }
    if (!res.ok) throw new Error('목록 조회 실패');
    const list = await res.json();
    $('loading').classList.add('hidden');

    if (list.length === 0) {
      $('emptyState').classList.remove('hidden');
      return;
    }

    const ul = $('sessionList');
    ul.classList.remove('hidden');
    list.forEach(s => {
      // 카메라 사용 안 한 면접은 80점 만점으로 표시
      const hasNv = !!s.has_nonverbal;
      const headlineScore = hasNv
        ? (s.final_score_100 ?? null)
        : (s.content_score_80 ?? null);
      const headlineMax = hasNv ? 100 : 80;
      const scoreText = headlineScore != null ? Number(headlineScore).toFixed(1) : '--';

      const sharedBadge = s.is_shared
        ? '<span class="px-2 py-0.5 bg-emerald-50 text-emerald-700 rounded text-[10px] font-semibold">공유 중</span>'
        : '';

      const displayTitle = (s.title && s.title.trim()) || '면접';
      ul.insertAdjacentHTML('beforeend', `
        <li class="bg-white border border-slate-200 rounded-2xl p-5 hover:shadow-sm transition" data-code="${escapeHtml(s.public_code)}">
          <div class="flex items-center gap-4">
            <div class="w-16 h-16 rounded-xl ${scoreColor(headlineScore, headlineMax)} flex flex-col items-center justify-center shrink-0">
              <span class="text-xl font-black leading-none">${scoreText}</span>
              <span class="text-[10px] opacity-70 mt-0.5">/ ${headlineMax}</span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1">
                <div class="flex items-baseline gap-1.5 min-w-0">
                  <p class="font-semibold truncate session-title" title="클릭해 이름 변경">${escapeHtml(displayTitle)}</p>
                  <sup class="text-[10px] text-slate-400 font-mono">#${escapeHtml(s.public_code)}</sup>
                </div>
                <button class="rename-btn text-slate-300 hover:text-slate-600 transition" title="이름 변경">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                </button>
                ${sharedBadge}
                ${s.model_used ? `<span class="px-2 py-0.5 bg-slate-100 text-slate-600 rounded text-[10px] font-mono">${escapeHtml(s.model_used)}</span>` : ''}
              </div>
              <p class="text-xs text-slate-500">
                ${formatDate(s.completed_at || s.created_at)} ·
                질문 ${s.n_questions}개 ·
                답변 ${s.content_score_80?.toFixed(1) ?? '--'}/80
                ${hasNv && s.nonverbal_score_20 != null ? ` · 비언어 ${s.nonverbal_score_20.toFixed(1)}/20` : ''}
              </p>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              <a href="/analysis/${encodeURIComponent(s.public_code)}"
                 class="px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-semibold transition">
                분석
              </a>
              <a href="/session/${encodeURIComponent(s.public_code)}"
                 class="px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-semibold transition">
                상세
              </a>
            </div>
          </div>
        </li>
      `);
    });
  } catch (e) {
    $('loading').textContent = '오류: ' + e.message;
  }
}

// 제목 인라인 편집
async function renameSession(code, currentTitle, anchorEl) {
  const cleaned = (currentTitle || '').trim();
  const next = prompt('새 이름을 입력하세요 (비우면 기본 이름)', cleaned === '면접' ? '' : cleaned);
  if (next === null) return;  // 취소
  try {
    const res = await fetch(`/api/sessions/${encodeURIComponent(code)}/title`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: next }),
    });
    if (!res.ok) throw new Error('이름 변경 실패');
    const data = await res.json();
    const newName = data.title || '면접';
    anchorEl.textContent = newName;
  } catch (e) {
    alert(e.message);
  }
}

document.addEventListener('click', (e) => {
  const renameBtn = e.target.closest('.rename-btn');
  const titleEl = e.target.closest('.session-title');
  if (!renameBtn && !titleEl) return;
  const li = e.target.closest('[data-code]');
  if (!li) return;
  const code = li.dataset.code;
  const titleSpan = li.querySelector('.session-title');
  if (!titleSpan) return;
  renameSession(code, titleSpan.textContent, titleSpan);
});

load();
</script>

</body>
</html>
