<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<title>Signal Catch — 관리자 · 사용자 상세</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" as="style" crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>body{font-family:'Pretendard Variable',system-ui,sans-serif}</style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">

<div id="impersonateBanner" class="hidden bg-amber-100 border-b border-amber-300 text-amber-900 text-sm">
  <div class="max-w-6xl mx-auto px-6 py-2 flex items-center justify-between">
    <span>👁️ 현재 <b id="impTargetName">-</b> 의 화면을 보는 중입니다.</span>
    <button id="exitImpBtn" class="px-3 py-1 rounded-md bg-amber-600 hover:bg-amber-700 text-white text-xs font-semibold">관리자로 복귀</button>
  </div>
</div>

<header class="bg-white border-b border-slate-200 sticky top-0 z-10">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center" aria-label="Signal Catch"><svg viewBox="0 0 32 32" class="w-5 h-5" fill="none" aria-hidden="true"><path d="M 5 15 Q 16 0 27 15" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" stroke-linecap="round" fill="none"/><path d="M 9 18 Q 16 9 23 18" stroke="rgba(255,255,255,0.9)" stroke-width="2.4" stroke-linecap="round" fill="none"/><circle cx="16" cy="21" r="2.6" fill="#ffffff"/></svg></div>
      <h1 class="text-lg font-bold tracking-tight">Signal Catch
        <span class="text-slate-400 font-normal text-sm">관리자 · 사용자</span>
      </h1>
    </a>
    <nav class="flex items-center gap-5 text-sm">
      <a href="/" class="text-slate-600 hover:text-slate-900">새 면접</a>
      <a href="/history" class="text-slate-600 hover:text-slate-900">내 기록</a>
      <a href="/board" class="text-slate-600 hover:text-slate-900">공유 게시판</a>
      <a href="/admin" class="font-semibold text-rose-600">관리</a>
      <button id="logoutBtn" class="text-slate-500 hover:text-rose-600 transition">로그아웃</button>
    </nav>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-10">
  <div class="mb-6">
    <a href="/admin" class="text-sm text-slate-500 hover:text-slate-800">← 사용자 목록으로</a>
  </div>

  <div id="loading" class="text-center py-20 text-slate-400 text-sm">불러오는 중...</div>

  <div id="content" class="hidden space-y-8">
    <!-- 프로필 카드 -->
    <section class="bg-white border border-slate-200 rounded-2xl p-6">
      <div class="flex items-start gap-5">
        <img id="uPic" alt=""
             class="w-20 h-20 rounded-full border bg-slate-100 object-cover"
             onerror="this.style.display='none'" />
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-3 mb-1">
            <h2 id="uName" class="text-2xl font-bold truncate">-</h2>
            <span id="uRoleBadge"></span>
            <span id="uActiveBadge"></span>
          </div>
          <p id="uEmail" class="text-slate-500 text-sm">-</p>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-4 text-xs">
            <div><span class="text-slate-400">사용자명</span><br><span id="uUsername" class="font-medium">-</span></div>
            <div><span class="text-slate-400">전화</span><br><span id="uPhone" class="font-medium">-</span></div>
            <div><span class="text-slate-400">로그인 방식</span><br><span id="uProvider" class="font-medium">-</span></div>
            <div><span class="text-slate-400">가입일</span><br><span id="uCreatedAt" class="font-medium">-</span></div>
            <div><span class="text-slate-400">마지막 로그인</span><br><span id="uLastLogin" class="font-medium">-</span></div>
            <div><span class="text-slate-400">전체 세션</span><br><span id="uSessionTotal" class="font-medium">-</span></div>
            <div><span class="text-slate-400">삭제된 세션</span><br><span id="uSessionDeleted" class="font-medium">-</span></div>
            <div><span class="text-slate-400">User ID</span><br><span id="uId" class="font-mono text-[10px] text-slate-400 truncate block">-</span></div>
          </div>
        </div>
        <div>
          <button id="impBtn" class="px-3 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-lg text-sm font-semibold">이 사용자로 입장</button>
        </div>
      </div>
    </section>

    <!-- 관리 액션 -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <!-- 역할 -->
      <div class="bg-white border border-slate-200 rounded-2xl p-5">
        <p class="text-sm font-semibold mb-3">역할</p>
        <select id="roleSelect" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
          <option value="user">user</option>
          <option value="moderator">moderator</option>
          <option value="admin">admin</option>
        </select>
        <button id="saveRoleBtn" class="mt-2 w-full px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-semibold">변경</button>
      </div>

      <!-- 이름 -->
      <div class="bg-white border border-slate-200 rounded-2xl p-5">
        <p class="text-sm font-semibold mb-3">이름 (닉네임)</p>
        <input id="nameInput" type="text" maxlength="100"
               class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm" />
        <button id="saveNameBtn" class="mt-2 w-full px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-semibold">변경</button>
      </div>

      <!-- 계정 상태 -->
      <div class="bg-white border border-slate-200 rounded-2xl p-5">
        <p class="text-sm font-semibold mb-3">계정 상태</p>
        <p id="suspendInfo" class="text-[11px] text-slate-500 mb-3">불러오는 중...</p>
        <div class="flex items-center gap-2">
          <button id="suspendBtn" class="flex-1 px-3 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-lg text-sm font-semibold">정지</button>
          <button id="unsuspendBtn" class="flex-1 px-3 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-semibold">해제</button>
        </div>
        <p class="text-[11px] text-slate-400 mt-2">관리자 계정은 정지할 수 없습니다.</p>
      </div>
    </section>

    <!-- 세션 목록 -->
    <section>
      <div class="flex items-end justify-between mb-3">
        <h3 class="text-lg font-bold">면접 세션</h3>
        <label class="text-sm text-slate-500 flex items-center gap-2">
          <input type="checkbox" id="includeDeleted" checked />
          삭제된 세션 포함
        </label>
      </div>
      <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm">
            <thead class="bg-slate-50 text-slate-600 text-xs uppercase tracking-wide">
              <tr>
                <th class="px-4 py-3 text-left sortable" data-sort="title">제목</th>
                <th class="px-4 py-3 text-left">코드</th>
                <th class="px-4 py-3 text-right sortable" data-sort="final_score_100">점수</th>
                <th class="px-4 py-3 text-left">사용 모델</th>
                <th class="px-4 py-3 text-left sortable" data-sort="is_shared">공유</th>
                <th class="px-4 py-3 text-left">공유 항목</th>
                <th class="px-4 py-3 text-left sortable" data-sort="is_deleted">상태</th>
                <th class="px-4 py-3 text-left sortable" data-sort="completed_at">완료</th>
                <th class="px-4 py-3 text-left sortable" data-sort="created_at">생성</th>
                <th class="px-4 py-3 text-right">관리</th>
              </tr>
            </thead>
            <tbody id="sessionsTbody" class="divide-y divide-slate-100">
              <tr><td colspan="10" class="px-4 py-10 text-center text-slate-400 text-sm">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
</main>

<!-- 정지 설정 모달 -->
<div id="suspendModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 space-y-4">
    <div>
      <h3 class="text-lg font-bold">계정 정지</h3>
      <p class="text-xs text-slate-500 mt-1">정지된 사용자는 즉시 로그인이 차단됩니다.</p>
    </div>
    <div class="space-y-2">
      <label class="flex items-start gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-50 has-[:checked]:border-rose-400 has-[:checked]:bg-rose-50">
        <input type="radio" name="suspendKind" value="temp" checked class="mt-0.5" />
        <div class="flex-1">
          <p class="text-sm font-semibold">기간 정지</p>
          <p class="text-xs text-slate-500 mt-0.5">기간이 지나면 자동으로 해제됩니다.</p>
          <div class="mt-2 flex items-center gap-2">
            <input id="suspendDays" type="number" min="1" max="3650" value="7"
                   class="w-20 px-2 py-1 border border-slate-300 rounded text-sm" />
            <span class="text-xs text-slate-600">일</span>
            <div class="ml-auto flex gap-1">
              <button type="button" class="day-preset px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-xs" data-d="1">1일</button>
              <button type="button" class="day-preset px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-xs" data-d="7">7일</button>
              <button type="button" class="day-preset px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-xs" data-d="30">30일</button>
              <button type="button" class="day-preset px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-xs" data-d="90">90일</button>
            </div>
          </div>
        </div>
      </label>
      <label class="flex items-start gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-50 has-[:checked]:border-rose-400 has-[:checked]:bg-rose-50">
        <input type="radio" name="suspendKind" value="perm" class="mt-0.5" />
        <div class="flex-1">
          <p class="text-sm font-semibold">영구 정지</p>
          <p class="text-xs text-slate-500 mt-0.5">관리자가 직접 해제하기 전까지 계속 차단됩니다.</p>
        </div>
      </label>
    </div>
    <div class="flex items-center justify-end gap-2 pt-2">
      <button id="suspendCancel" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-semibold">취소</button>
      <button id="suspendConfirm" class="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-lg text-sm font-semibold">정지</button>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const USER_ID = location.pathname.split('/').pop();

let SORT = 'created_at';
let ORDER = 'desc';
let INCLUDE_DELETED = true;

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmt(d){
  if(!d) return '-';
  const x = new Date(d);
  if (isNaN(x)) return '-';
  return `${x.getFullYear()}.${String(x.getMonth()+1).padStart(2,'0')}.${String(x.getDate()).padStart(2,'0')} ${String(x.getHours()).padStart(2,'0')}:${String(x.getMinutes()).padStart(2,'0')}`;
}
async function api(url, opts={}) {
  const res = await fetch(url, {credentials:'same-origin', ...opts});
  if (res.status === 401) { location.href='/login'; return; }
  if (res.status === 403) { alert('관리자 권한이 필요합니다.'); location.href='/'; return; }
  if (!res.ok) {
    const t = await res.text().catch(()=>'');
    throw new Error(t || `HTTP ${res.status}`);
  }
  return res.json();
}

// 임퍼소네이션 배너 + 본인 입장 차단용으로 ME 저장
let ME = null;
(async () => {
  try {
    const me = await api('/auth/me');
    ME = me;
    if (me?.impersonating && me?.admin) {
      $('impTargetName').textContent = me.name || me.email;
      $('impersonateBanner').classList.remove('hidden');
    }
    // 자기 자신 상세 페이지면 입장 버튼 비활성화
    if (me?.id === USER_ID) {
      const btn = $('impBtn');
      if (btn) {
        btn.disabled = true;
        btn.classList.add('opacity-50', 'cursor-not-allowed');
        btn.title = '자기 자신의 화면으로 입장할 수 없습니다.';
      }
    }
  } catch(e) {}
})();
$('exitImpBtn')?.addEventListener('click', async () => {
  try { await api('/api/admin/impersonate/exit', {method:'POST'}); location.reload(); }
  catch(e){ alert(e.message); }
});
$('logoutBtn').addEventListener('click', async () => {
  await fetch('/auth/logout', {method:'POST'});
  location.href = '/login';
});

// ---------- 사용자 상세 ----------
function roleBadge(r) {
  const cls = ({admin:'bg-rose-100 text-rose-700', moderator:'bg-indigo-100 text-indigo-700', user:'bg-slate-100 text-slate-600'})[r] || 'bg-slate-100 text-slate-600';
  return `<span class="inline-flex px-2 py-0.5 rounded-md text-[11px] font-semibold ${cls}">${escapeHtml(r)}</span>`;
}
function statusBadge(active) {
  return active
    ? '<span class="inline-flex px-2 py-0.5 rounded-md bg-emerald-100 text-emerald-700 text-[11px] font-semibold">활성</span>'
    : '<span class="inline-flex px-2 py-0.5 rounded-md bg-amber-100 text-amber-700 text-[11px] font-semibold">정지</span>';
}

let CURRENT_USER = null;

async function loadUser() {
  try {
    const u = await api(`/api/admin/users/${encodeURIComponent(USER_ID)}`);
    CURRENT_USER = u;
    $('loading').classList.add('hidden');
    $('content').classList.remove('hidden');

    $('uName').textContent          = u.name || '(이름 없음)';
    $('uEmail').textContent         = u.email;
    $('uUsername').textContent      = u.username || '-';
    $('uPhone').textContent         = u.phone || '-';
    $('uProvider').textContent      = u.auth_provider;
    $('uCreatedAt').textContent     = fmt(u.created_at);
    $('uLastLogin').textContent     = fmt(u.last_login_at);
    $('uSessionTotal').textContent  = u.session_count_total;
    $('uSessionDeleted').textContent= u.session_count_deleted;
    $('uId').textContent            = u.id;
    $('uRoleBadge').innerHTML       = roleBadge(u.role);
    $('uActiveBadge').innerHTML     = statusBadgeWithExpiry(u.is_active, u.suspended_until);
    if (u.picture) { $('uPic').src = u.picture; } else { $('uPic').style.display = 'none'; }

    $('roleSelect').value = u.role;
    $('nameInput').value  = u.name || '';

    // 정지 박스 정보
    if (u.is_active) {
      $('suspendInfo').textContent = '현재 활성 상태입니다.';
      $('suspendBtn').disabled    = (u.role === 'admin');
      $('unsuspendBtn').disabled  = true;
      $('suspendBtn').classList.toggle('opacity-50', u.role === 'admin');
      $('suspendBtn').classList.toggle('cursor-not-allowed', u.role === 'admin');
    } else {
      if (u.suspended_until) {
        $('suspendInfo').innerHTML = `현재 정지 중 — <b>${fmt(u.suspended_until)}</b> 까지`;
      } else {
        $('suspendInfo').textContent = '현재 영구 정지 중';
      }
      $('suspendBtn').disabled    = (u.role === 'admin');
      $('unsuspendBtn').disabled  = false;
    }
  } catch(e) {
    $('loading').textContent = '오류: ' + e.message;
  }
}

function statusBadgeWithExpiry(active, suspendedUntil) {
  if (active) {
    return '<span class="inline-flex px-2 py-0.5 rounded-md bg-emerald-100 text-emerald-700 text-[11px] font-semibold">활성</span>';
  }
  if (suspendedUntil) {
    return `<span class="inline-flex px-2 py-0.5 rounded-md bg-amber-100 text-amber-700 text-[11px] font-semibold">정지 · ${fmt(suspendedUntil)} 까지</span>`;
  }
  return '<span class="inline-flex px-2 py-0.5 rounded-md bg-rose-100 text-rose-700 text-[11px] font-semibold">영구 정지</span>';
}

// 역할 변경
$('saveRoleBtn').addEventListener('click', async () => {
  const role = $('roleSelect').value;
  try {
    await api(`/api/admin/users/${encodeURIComponent(USER_ID)}/role`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({role}),
    });
    alert('역할이 변경됐습니다.');
    loadUser();
  } catch(e){ alert(e.message); }
});

// 이름 변경
$('saveNameBtn').addEventListener('click', async () => {
  const name = $('nameInput').value;
  try {
    await api(`/api/admin/users/${encodeURIComponent(USER_ID)}/name`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name}),
    });
    alert('이름이 변경됐습니다.');
    loadUser();
  } catch(e){ alert(e.message); }
});

// 정지 — 모달 띄움
$('suspendBtn').addEventListener('click', () => {
  if (CURRENT_USER?.role === 'admin') {
    alert('관리자 계정은 정지할 수 없습니다. 먼저 역할을 변경하세요.');
    return;
  }
  $('suspendModal').classList.remove('hidden');
});
$('suspendCancel').addEventListener('click', () => $('suspendModal').classList.add('hidden'));
document.querySelectorAll('.day-preset').forEach(b => {
  b.addEventListener('click', () => {
    $('suspendDays').value = b.dataset.d;
    document.querySelector('input[name="suspendKind"][value="temp"]').checked = true;
  });
});

$('suspendConfirm').addEventListener('click', async () => {
  const kind = document.querySelector('input[name="suspendKind"]:checked').value;
  let body;
  if (kind === 'perm') {
    if (!confirm('영구 정지하시겠습니까? 관리자가 직접 해제하기 전까지 차단됩니다.')) return;
    body = { is_active: false, duration_days: null };
  } else {
    const d = Number($('suspendDays').value);
    if (!d || d < 1) { alert('정지 일수를 1일 이상으로 입력하세요.'); return; }
    if (!confirm(`${d}일 동안 정지하시겠습니까?`)) return;
    body = { is_active: false, duration_days: d };
  }
  try {
    await api(`/api/admin/users/${encodeURIComponent(USER_ID)}/active`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    $('suspendModal').classList.add('hidden');
    loadUser();
  } catch(e){ alert(e.message); }
});

// 해제
$('unsuspendBtn').addEventListener('click', async () => {
  if (!confirm('정지를 해제하시겠습니까?')) return;
  try {
    await api(`/api/admin/users/${encodeURIComponent(USER_ID)}/active`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({is_active: true}),
    });
    loadUser();
  } catch(e){ alert(e.message); }
});

// 임퍼소네이션
$('impBtn').addEventListener('click', async () => {
  if (ME && ME.id === USER_ID) {
    alert('자기 자신의 화면으로 입장할 수 없습니다.');
    return;
  }
  if (!confirm('이 사용자의 화면을 보시겠습니까? 메인 페이지로 이동합니다.')) return;
  try {
    await api(`/api/admin/impersonate/${encodeURIComponent(USER_ID)}`, {method:'POST'});
    location.href = '/';
  } catch(e){ alert(e.message); }
});

// ---------- 세션 목록 ----------
function sortArrow(col) {
  if (col !== SORT) return '<span class="text-slate-300 ml-1">↕</span>';
  return ORDER === 'desc' ? '<span class="text-slate-700 ml-1">▼</span>' : '<span class="text-slate-700 ml-1">▲</span>';
}
function updateHeaderArrows() {
  document.querySelectorAll('th.sortable').forEach(th => {
    const col = th.dataset.sort;
    const label = th.textContent.replace(/[▲▼↕]/g,'').trim();
    th.innerHTML = label + sortArrow(col);
    th.classList.add('cursor-pointer','hover:bg-slate-100','transition');
  });
}

function shareToggle(code, kind, on) {
  const label = ({audio:'음성', video:'영상', resume:'이력서', board:'게시판'})[kind] || kind;
  return `
    <button data-act="share-toggle" data-code="${escapeHtml(code)}" data-kind="${kind}" data-on="${on?'1':'0'}"
            class="px-1.5 py-0.5 rounded text-[10px] font-semibold ${on ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'}">
      ${label}${on?' ✓':''}
    </button>`;
}

async function loadSessions() {
  updateHeaderArrows();
  const tbody = $('sessionsTbody');
  tbody.innerHTML = '<tr><td colspan="9" class="px-4 py-10 text-center text-slate-400 text-sm">불러오는 중...</td></tr>';
  const url = new URL(`/api/admin/users/${encodeURIComponent(USER_ID)}/sessions`, location.origin);
  url.searchParams.set('include_deleted', INCLUDE_DELETED ? 'true' : 'false');
  url.searchParams.set('sort', SORT);
  url.searchParams.set('order', ORDER);
  try {
    const list = await api(url.pathname + url.search);
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="10" class="px-4 py-10 text-center text-slate-400 text-sm">아직 면접 세션이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(s => {
      const score = s.final_score_100 != null ? Number(s.final_score_100).toFixed(1) : '--';
      const sharedTag = s.is_shared
        ? '<span class="inline-flex px-2 py-0.5 rounded-md bg-emerald-100 text-emerald-700 text-[11px] font-semibold">공유</span>'
        : '<span class="inline-flex px-2 py-0.5 rounded-md bg-slate-100 text-slate-400 text-[11px] font-semibold">비공개</span>';
      const deletedTag = s.is_deleted
        ? '<span class="inline-flex px-2 py-0.5 rounded-md bg-rose-100 text-rose-700 text-[11px] font-semibold">삭제됨</span>'
        : '<span class="inline-flex px-2 py-0.5 rounded-md bg-slate-100 text-slate-500 text-[11px] font-semibold">활성</span>';

      const shareControls = `
        <div class="flex items-center gap-1">
          ${shareToggle(s.public_code, 'audio',  s.share_includes_audio)}
          ${shareToggle(s.public_code, 'video',  s.share_includes_video)}
          ${shareToggle(s.public_code, 'resume', s.share_includes_resume)}
          ${shareToggle(s.public_code, 'board',  s.list_on_board)}
        </div>`;

      const modelTag = s.model_used
        ? `<span class="inline-flex px-2 py-0.5 rounded-md bg-indigo-50 text-indigo-700 text-[11px] font-mono">${escapeHtml(s.model_used)}</span>`
        : `<span class="text-slate-300 text-[11px]">-</span>`;

      const actions = `
        <a href="/analysis/${encodeURIComponent(s.public_code)}" class="px-2 py-1 bg-indigo-600 hover:bg-indigo-700 text-white rounded text-xs font-semibold">분석</a>
        <a href="/session/${encodeURIComponent(s.public_code)}" class="ml-1 px-2 py-1 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded text-xs font-semibold">상세</a>
        <button data-act="toggle-share" data-code="${escapeHtml(s.public_code)}" data-on="${s.is_shared?'1':'0'}"
                class="ml-1 px-2 py-1 rounded text-xs font-semibold ${s.is_shared?'bg-amber-100 text-amber-700 hover:bg-amber-200':'bg-emerald-100 text-emerald-700 hover:bg-emerald-200'}">
          ${s.is_shared?'공유 해제':'공유 시작'}
        </button>
        ${s.is_deleted
          ? `<button data-act="restore" data-code="${escapeHtml(s.public_code)}" class="ml-1 px-2 py-1 bg-emerald-600 hover:bg-emerald-700 text-white rounded text-xs font-semibold">복원</button>
             <button data-act="hard-delete" data-code="${escapeHtml(s.public_code)}" class="ml-1 px-2 py-1 bg-black hover:bg-slate-800 text-white rounded text-xs font-semibold">영구 삭제</button>`
          : `<button data-act="delete" data-code="${escapeHtml(s.public_code)}" class="ml-1 px-2 py-1 bg-rose-600 hover:bg-rose-700 text-white rounded text-xs font-semibold">삭제</button>`}
      `;
      return `
      <tr class="hover:bg-slate-50 ${s.is_deleted ? 'opacity-60' : ''}" data-code="${escapeHtml(s.public_code)}">
        <td class="px-4 py-3"><span class="font-medium">${escapeHtml(s.title || '면접')}</span></td>
        <td class="px-4 py-3 font-mono text-[11px] text-slate-400">#${escapeHtml(s.public_code)}</td>
        <td class="px-4 py-3 text-right tabular-nums font-semibold">${score}<span class="text-[10px] text-slate-400">/100</span></td>
        <td class="px-4 py-3">${modelTag}</td>
        <td class="px-4 py-3">${sharedTag}</td>
        <td class="px-4 py-3">${shareControls}</td>
        <td class="px-4 py-3">${deletedTag}</td>
        <td class="px-4 py-3 text-xs text-slate-500">${fmt(s.completed_at)}</td>
        <td class="px-4 py-3 text-xs text-slate-500">${fmt(s.created_at)}</td>
        <td class="px-4 py-3 text-right whitespace-nowrap">${actions}</td>
      </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="10" class="px-4 py-10 text-center text-rose-500 text-sm">오류: ${escapeHtml(e.message)}</td></tr>`;
  }
}

// 정렬 / 액션 위임
document.addEventListener('click', async (e) => {
  const th = e.target.closest('th.sortable');
  if (th) {
    const col = th.dataset.sort;
    if (SORT === col) ORDER = (ORDER === 'desc' ? 'asc' : 'desc');
    else { SORT = col; ORDER = ['created_at','completed_at','final_score_100'].includes(col) ? 'desc' : 'asc'; }
    loadSessions();
    return;
  }
  const btn = e.target.closest('button[data-act]');
  if (!btn) return;
  const code = btn.dataset.code;
  const act = btn.dataset.act;

  try {
    if (act === 'toggle-share') {
      const isOn = btn.dataset.on === '1';
      await api(`/api/sessions/${encodeURIComponent(code)}/share`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({is_shared: !isOn}),
      });
      loadSessions();
    } else if (act === 'delete') {
      if (!confirm('정말로 삭제하시겠습니까?')) return;
      await api(`/api/sessions/${encodeURIComponent(code)}`, {method:'DELETE'});
      loadSessions();
      loadUser();   // counts refresh
    } else if (act === 'restore') {
      await api(`/api/sessions/${encodeURIComponent(code)}/restore`, {method:'POST'});
      loadSessions();
      loadUser();
    } else if (act === 'hard-delete') {
      const txt = '이 면접 세션을 영구 삭제합니다.\n' +
                  '- DB의 질문/답변/평가/비언어 기록\n' +
                  '- Supabase 영상 파일\n' +
                  '- 로컬 녹음 파일\n' +
                  '- 다른 세션이 사용하지 않는 이력서\n\n' +
                  '되돌릴 수 없습니다. 진행할까요?';
      if (!confirm(txt)) return;
      const r = await api(`/api/sessions/${encodeURIComponent(code)}/permanent`, {method:'DELETE'});
      let msg = '영구 삭제 완료';
      if (r) {
        const parts = [];
        if (r.videos_deleted) parts.push(`영상 ${r.videos_deleted}개 삭제`);
        if (r.videos_failed)  parts.push(`영상 ${r.videos_failed}개 실패`);
        if (r.audio_dir_removed) parts.push('녹음 디렉토리 삭제');
        if (r.resume_removed) parts.push('이력서 삭제');
        if (parts.length) msg += ' — ' + parts.join(', ');
      }
      alert(msg);
      loadSessions();
      loadUser();
    } else if (act === 'share-toggle') {
      const kind = btn.dataset.kind;
      const isOn = btn.dataset.on === '1';
      const key = ({
        audio:  'share_includes_audio',
        video:  'share_includes_video',
        resume: 'share_includes_resume',
        board:  'list_on_board',
      })[kind];
      await api(`/api/sessions/${encodeURIComponent(code)}/share`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({[key]: !isOn}),
      });
      loadSessions();
    }
  } catch(err) {
    alert(err.message);
  }
});

$('includeDeleted').addEventListener('change', (e) => {
  INCLUDE_DELETED = e.target.checked;
  loadSessions();
});

// 초기
loadUser();
loadSessions();
</script>

</body>
</html>
