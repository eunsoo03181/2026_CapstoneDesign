<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<title>Signal Catch — 공유 게시판</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" as="style" crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>body{font-family:'Pretendard Variable',system-ui,sans-serif}</style>
<script src="/static/admin_chrome.js?v=credit-tip" defer></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<header class="bg-white border-b border-slate-200 sticky top-0 z-10">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center" aria-label="Signal Catch"><svg viewBox="0 0 32 32" class="w-5 h-5" fill="none" aria-hidden="true"><path d="M 5 15 Q 16 0 27 15" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" stroke-linecap="round" fill="none"/><path d="M 9 18 Q 16 9 23 18" stroke="rgba(255,255,255,0.9)" stroke-width="2.4" stroke-linecap="round" fill="none"/><circle cx="16" cy="21" r="2.6" fill="#ffffff"/></svg></div>
      <h1 class="text-lg font-bold tracking-tight">Signal Catch
        <span class="text-slate-400 font-normal text-sm">공유 게시판</span>
      </h1>
    </a>
    <nav class="flex items-center gap-5 text-sm">
      <a href="/" class="text-slate-600 hover:text-slate-900">새 면접</a>
      <a href="/history" class="text-slate-600 hover:text-slate-900">내 기록</a>
      <a href="/board" class="font-semibold text-indigo-600">공유 게시판</a>
      <button id="logoutBtn" class="text-slate-500 hover:text-rose-600 transition">로그아웃</button>
    </nav>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-10">

  <div class="flex items-end justify-between mb-6 flex-wrap gap-3">
    <div>
      <h2 class="text-2xl font-bold">공유된 면접 둘러보기</h2>
      <p class="text-sm text-slate-500 mt-1">다른 사용자들이 게시판에 공유한 면접을 볼 수 있습니다.</p>
    </div>
    <div class="flex items-center gap-2">
      <input id="searchInput" type="search" placeholder="제목 · 작성자 검색"
             class="px-3 py-2 border border-slate-300 rounded-lg text-sm w-64 focus:outline-none focus:ring-2 focus:ring-indigo-300" />
      <select id="sortSelect" class="px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white">
        <option value="created_at:desc">최신순</option>
        <option value="completed_at:desc">완료 최근순</option>
        <option value="final_score_100:desc">점수 높은순</option>
        <option value="final_score_100:asc">점수 낮은순</option>
        <option value="title:asc">제목 가나다순</option>
      </select>
    </div>
  </div>

  <div id="loading" class="text-center py-20 text-slate-400 text-sm">불러오는 중...</div>

  <div id="emptyState" class="hidden text-center py-20 bg-white border border-slate-200 rounded-2xl">
    <svg class="w-12 h-12 mx-auto text-slate-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
    </svg>
    <p class="text-slate-500 text-sm">아직 게시판에 등록된 면접이 없어요.</p>
    <p class="text-slate-400 text-xs mt-1">본인 면접 기록의 공유 옵션에서 "게시판에 등록"을 켜면 여기에 나타납니다.</p>
  </div>

  <ul id="cards" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></ul>

  <!-- 페이지네이션 -->
  <div id="pager" class="hidden mt-8 flex items-center justify-center gap-2 text-sm">
    <button id="prevBtn" class="px-3 py-1.5 bg-white border border-slate-300 rounded-lg hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed">이전</button>
    <span id="pageInfo" class="text-slate-500">-</span>
    <button id="nextBtn" class="px-3 py-1.5 bg-white border border-slate-300 rounded-lg hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed">다음</button>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);

let PAGE = 1;
const PAGE_SIZE = 12;
let SORT = 'created_at';
let ORDER = 'desc';
let QUERY = '';
let SEARCH_TIMER = null;
let TOTAL = 0;

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmtDate(s){
  if(!s)return'-';
  const d=new Date(s); if(isNaN(d)) return '-';
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function scoreColor(score, max){
  if (score == null) return 'bg-slate-100 text-slate-500';
  const pct = (score / max) * 100;
  if (pct >= 80) return 'bg-emerald-100 text-emerald-700';
  if (pct >= 60) return 'bg-indigo-100 text-indigo-700';
  if (pct >= 40) return 'bg-amber-100 text-amber-700';
  return 'bg-rose-100 text-rose-700';
}

$('logoutBtn').addEventListener('click', async () => {
  await fetch('/auth/logout', {method:'POST'});
  location.href = '/login';
});

async function load() {
  $('loading').classList.remove('hidden');
  $('cards').classList.add('hidden');
  $('emptyState').classList.add('hidden');
  $('pager').classList.add('hidden');

  const url = new URL('/api/board/sessions', location.origin);
  url.searchParams.set('page', PAGE);
  url.searchParams.set('page_size', PAGE_SIZE);
  url.searchParams.set('sort', SORT);
  url.searchParams.set('order', ORDER);
  if (QUERY) url.searchParams.set('q', QUERY);

  try {
    const res = await fetch(url, { credentials: 'same-origin' });
    if (res.status === 401) { location.href = '/login'; return; }
    if (!res.ok) throw new Error('불러오기 실패');
    const data = await res.json();
    TOTAL = data.total;

    $('loading').classList.add('hidden');

    if (!data.items.length) {
      if (PAGE > 1) { PAGE = 1; return load(); }
      $('emptyState').classList.remove('hidden');
      return;
    }

    const ul = $('cards');
    ul.innerHTML = '';
    data.items.forEach(s => {
      // 모든 점수는 100점 만점 환산 (final_score_100). 옛 세션 fallback: 언어 점수만 있을 때 ×1.25
      const score = (s.final_score_100 != null)
        ? s.final_score_100
        : (s.content_score_80 != null ? Number(s.content_score_80) * 1.25 : null);
      const max   = 100;
      const scoreText = score != null ? Number(score).toFixed(1) : '--';
      const title = (s.title && s.title.trim()) || '면접';

      ul.insertAdjacentHTML('beforeend', `
        <li>
          <a href="/share/${encodeURIComponent(s.public_code)}"
             class="block bg-white border border-slate-200 rounded-2xl p-5 hover:shadow-md hover:border-indigo-200 transition h-full">
            <div class="flex items-start gap-4 mb-3">
              <div class="w-14 h-14 rounded-xl ${scoreColor(score, max)} flex flex-col items-center justify-center shrink-0">
                <span class="text-lg font-black leading-none">${scoreText}</span>
                <span class="text-[9px] opacity-70 mt-0.5">/ ${max}</span>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1.5 mb-1 flex-wrap">
                  <p class="font-semibold leading-snug break-words">${escapeHtml(title)}</p>
                  ${s.is_mine ? '<span class="px-1.5 py-0.5 bg-indigo-50 text-indigo-700 rounded text-[10px] font-semibold">내 글</span>' : ''}
                </div>
                <p class="text-xs text-slate-500">
                  <span class="font-medium text-slate-700">${escapeHtml(s.author_name)}</span>
                  · ${fmtDate(s.completed_at || s.created_at)}
                </p>
              </div>
            </div>
            <div class="flex items-center gap-2 text-[11px] text-slate-500 flex-wrap">
              <span>질문 ${s.n_questions}개</span>
              <span class="text-slate-300">·</span>
              <span>답변 ${s.content_score_80 != null ? Number(s.content_score_80).toFixed(1) : '--'}/80</span>
              ${hasNv && s.nonverbal_score_20 != null ? `<span class="text-slate-300">·</span><span>비언어 ${Number(s.nonverbal_score_20).toFixed(1)}/20</span>` : ''}
              ${s.model_used ? `<span class="ml-auto px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded text-[10px] font-mono">${escapeHtml(s.model_used)}</span>` : ''}
            </div>
          </a>
        </li>
      `);
    });
    ul.classList.remove('hidden');

    // 페이지네이션
    const totalPages = Math.max(1, Math.ceil(TOTAL / PAGE_SIZE));
    $('pageInfo').textContent = `${PAGE} / ${totalPages} (전체 ${TOTAL}개)`;
    $('prevBtn').disabled = (PAGE <= 1);
    $('nextBtn').disabled = (PAGE >= totalPages);
    if (totalPages > 1) $('pager').classList.remove('hidden');
  } catch (e) {
    $('loading').textContent = '오류: ' + e.message;
  }
}

$('searchInput').addEventListener('input', (e) => {
  clearTimeout(SEARCH_TIMER);
  SEARCH_TIMER = setTimeout(() => {
    QUERY = e.target.value.trim();
    PAGE = 1;
    load();
  }, 250);
});

$('sortSelect').addEventListener('change', (e) => {
  const [s, o] = e.target.value.split(':');
  SORT = s; ORDER = o;
  PAGE = 1;
  load();
});

$('prevBtn').addEventListener('click', () => { if (PAGE > 1) { PAGE--; load(); } });
$('nextBtn').addEventListener('click', () => { PAGE++; load(); });

load();
</script>

</body>
</html>
