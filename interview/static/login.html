<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<title>Signal Catch — 로그인</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" as="style" crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  body { font-family: 'Pretendard Variable', system-ui, sans-serif; }
  .tab-active { color: #4f46e5; border-bottom-color: #4f46e5; }
  .form-input {
    width: 100%;
    padding: 0.625rem 0.875rem;
    border: 1px solid rgb(203 213 225);
    border-radius: 0.5rem;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgb(99 102 241 / 0.15);
  }
</style>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center px-4 py-10">

<div class="w-full max-w-md">
  <!-- 인증 결과 / 가입 직후 배너 (URL ?verified=... 또는 ?signed_up=... 에 따라 표시) -->
  <div id="topBanner" class="hidden mb-4 rounded-xl px-4 py-3 text-sm border"></div>

  <!-- Brand -->
  <div class="text-center mb-6">
    <div class="inline-flex items-center gap-2 mb-3">
      <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center" aria-label="Signal Catch">
        <svg viewBox="0 0 32 32" class="w-7 h-7" fill="none" aria-hidden="true">
          <path d="M 5 15 Q 16 0 27 15" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <path d="M 9 18 Q 16 9 23 18" stroke="rgba(255,255,255,0.9)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
          <circle cx="16" cy="21" r="2.8" fill="#ffffff"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold tracking-tight">Signal Catch</h1>
    </div>
    <p class="text-sm text-slate-500">AI 모의면접 시뮬레이터</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

    <!-- Tab Switcher -->
    <div class="flex border-b border-slate-200">
      <button id="tabLogin" class="flex-1 py-3.5 text-sm font-semibold tab-active border-b-2 border-transparent transition">
        로그인
      </button>
      <button id="tabSignup" class="flex-1 py-3.5 text-sm font-semibold text-slate-500 border-b-2 border-transparent transition">
        회원가입
      </button>
    </div>

    <!-- ========== Login Form ========== -->
    <form id="loginForm" class="p-7 space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-700 mb-1.5">아이디 또는 이메일</label>
        <input id="loginIdentifier" type="text" required autocomplete="username"
               class="form-input" placeholder="user1 또는 user1@example.com" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-700 mb-1.5">비밀번호</label>
        <input id="loginPassword" type="password" required autocomplete="current-password"
               class="form-input" placeholder="••••••••" />
      </div>

      <p id="loginError" class="text-xs text-rose-600 hidden"></p>

      <button type="submit" id="loginSubmit"
              class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-semibold transition disabled:opacity-50 disabled:cursor-not-allowed">
        로그인
      </button>

      <div class="relative my-5">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
        <span class="relative bg-white px-3 text-xs text-slate-400 mx-auto block w-fit">또는</span>
      </div>

      <a href="/auth/google/login"
         class="w-full flex items-center justify-center gap-2 py-2.5 border border-slate-300 hover:bg-slate-50 rounded-lg text-sm font-medium transition">
        <svg class="w-4 h-4" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google 로 계속하기
      </a>

    </form>

    <!-- ========== Signup Form ========== -->
    <form id="signupForm" class="p-7 space-y-4 hidden">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold text-slate-700 mb-1.5">아이디 *</label>
          <input id="suUsername" type="text" required minlength="3" maxlength="50" autocomplete="username"
                 class="form-input" placeholder="3자 이상" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-700 mb-1.5">이름</label>
          <input id="suName" type="text" maxlength="100" autocomplete="name"
                 class="form-input" placeholder="홍길동" />
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-700 mb-1.5">이메일 *</label>
        <input id="suEmail" type="email" required autocomplete="email"
               class="form-input" placeholder="you@example.com" />
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-700 mb-1.5">전화번호</label>
        <input id="suPhone" type="tel" maxlength="20" autocomplete="tel"
               class="form-input" placeholder="010-1234-5678 (선택)" />
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-700 mb-1.5">비밀번호 *</label>
        <input id="suPassword" type="password" required minlength="8" maxlength="128" autocomplete="new-password"
               class="form-input" placeholder="8자 이상" />
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-700 mb-1.5">비밀번호 확인 *</label>
        <input id="suPasswordConfirm" type="password" required minlength="8" maxlength="128" autocomplete="new-password"
               class="form-input" placeholder="다시 한 번" />
      </div>

      <p id="signupError" class="text-xs text-rose-600 hidden"></p>

      <button type="submit" id="signupSubmit"
              class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-semibold transition disabled:opacity-50 disabled:cursor-not-allowed">
        가입하기
      </button>

      <p class="text-[11px] text-slate-500 leading-relaxed bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
        ✉️ 가입 후 입력하신 이메일로 <b>인증 메일</b> 이 발송됩니다.
        링크를 클릭해 인증을 완료해야 면접을 시작할 수 있어요.
      </p>

      <div class="relative my-5">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
        <span class="relative bg-white px-3 text-xs text-slate-400 mx-auto block w-fit">또는</span>
      </div>

      <a href="/auth/google/login"
         class="w-full flex items-center justify-center gap-2 py-2.5 border border-slate-300 hover:bg-slate-50 rounded-lg text-sm font-medium transition">
        <svg class="w-4 h-4" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google 로 가입하기
      </a>
      <p class="text-[11px] text-slate-400 text-center mt-2">
        Google 계정으로 가입하면 별도 이메일 인증이 필요 없습니다.
      </p>

      <p class="text-[11px] text-slate-400 text-center">가입 시 본 서비스의 이용약관 및 개인정보 처리방침에 동의하는 것으로 간주됩니다.</p>
    </form>
  </div>

  <p class="text-center text-xs text-slate-400 mt-6">© 2026 Signal Catch Capstone</p>
</div>

<script>
const $ = (id) => document.getElementById(id);

// ===== URL 파라미터 기반 배너 (이메일 인증 결과 / 가입 직후) =====
(function showTopBanner() {
  const params = new URLSearchParams(location.search);
  const banner = $('topBanner');
  if (!banner) return;
  const show = (cls, html) => {
    banner.className = 'mb-4 rounded-xl px-4 py-3 text-sm border ' + cls;
    banner.innerHTML = html;
    banner.classList.remove('hidden');
  };

  if (params.get('verified') === '1') {
    show('bg-emerald-50 border-emerald-200 text-emerald-800',
      '✅ 이메일 인증이 완료되었어요. 이제 로그인 후 면접을 시작할 수 있습니다.');
    return;
  }
  if (params.get('verified') === '0') {
    const reason = params.get('reason') || '';
    const msg = {
      invalid:      '⚠️ 유효하지 않은 인증 링크입니다.',
      already_used: 'ℹ️ 이미 사용된 링크입니다. 이미 인증이 완료됐을 수 있어요.',
      expired:      '⚠️ 링크가 만료됐어요 (24시간 경과). 로그인 후 우측 상단에서 재발송을 요청하세요.',
      user_gone:    '⚠️ 계정을 찾을 수 없습니다.',
    }[reason] || '⚠️ 이메일 인증에 실패했습니다.';
    show('bg-rose-50 border-rose-200 text-rose-700', msg);
    return;
  }
  if (params.get('signed_up') === '1') {
    const email = decodeURIComponent(params.get('email') || '');
    show('bg-amber-50 border-amber-200 text-amber-800',
      '✉️ 가입이 완료되었어요!<br>' +
      '<b>' + email.replace(/</g, '&lt;') + '</b> 으로 인증 메일을 보냈어요. ' +
      '메일의 링크를 클릭해 인증을 완료하면 면접을 시작할 수 있습니다.');
    return;
  }
})();

// ===== Tab switching =====
function showTab(name) {
  if (name === 'login') {
    $('tabLogin').classList.add('tab-active');
    $('tabLogin').classList.remove('text-slate-500');
    $('tabSignup').classList.remove('tab-active');
    $('tabSignup').classList.add('text-slate-500');
    $('loginForm').classList.remove('hidden');
    $('signupForm').classList.add('hidden');
  } else {
    $('tabSignup').classList.add('tab-active');
    $('tabSignup').classList.remove('text-slate-500');
    $('tabLogin').classList.remove('tab-active');
    $('tabLogin').classList.add('text-slate-500');
    $('signupForm').classList.remove('hidden');
    $('loginForm').classList.add('hidden');
  }
}
$('tabLogin').addEventListener('click', () => showTab('login'));
$('tabSignup').addEventListener('click', () => showTab('signup'));

// URL #signup 으로 들어오면 가입 탭부터
if (location.hash === '#signup') showTab('signup');

// ===== Helpers =====
function showError(boxId, msg) {
  const el = $(boxId);
  el.textContent = msg;
  el.classList.remove('hidden');
}
function clearError(boxId) {
  $(boxId).classList.add('hidden');
}

async function apiPost(path, body) {
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    throw new Error(data.detail || `요청 실패 (${res.status})`);
  }
  return data;
}

// ===== Login =====
$('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearError('loginError');
  const btn = $('loginSubmit');
  btn.disabled = true; btn.textContent = '로그인 중...';
  try {
    await apiPost('/auth/login', {
      identifier: $('loginIdentifier').value.trim(),
      password:   $('loginPassword').value,
    });
    // 성공 → 메인으로 이동
    location.href = '/';
  } catch (err) {
    showError('loginError', err.message);
    btn.disabled = false; btn.textContent = '로그인';
  }
});

// ===== Signup =====
$('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearError('signupError');

  const username = $('suUsername').value.trim();
  const email    = $('suEmail').value.trim();
  const password = $('suPassword').value;
  const confirm  = $('suPasswordConfirm').value;
  const name     = $('suName').value.trim();
  const phone    = $('suPhone').value.trim();

  // 클라이언트 검증
  if (!/^[a-zA-Z0-9_]+$/.test(username)) {
    showError('signupError', '아이디는 영문/숫자/언더스코어만 사용 가능합니다.');
    return;
  }
  if (password !== confirm) {
    showError('signupError', '비밀번호 확인이 일치하지 않습니다.');
    return;
  }
  if (password.length < 8) {
    showError('signupError', '비밀번호는 8자 이상이어야 합니다.');
    return;
  }

  const btn = $('signupSubmit');
  btn.disabled = true; btn.textContent = '가입 중...';
  try {
    await apiPost('/auth/signup', {
      username, email, password,
      name: name || username,
      phone: phone || null,
    });
    // 가입 성공 → 자동 로그인됨. 하지만 이메일 인증 전이라 면접은 차단.
    // 사용자에게 명확히 안내하고 인증 메일 확인 유도.
    location.href = '/login?signed_up=1&email=' + encodeURIComponent(email);
  } catch (err) {
    showError('signupError', err.message);
    btn.disabled = false; btn.textContent = '가입하기';
  }
});
</script>

</body>
</html>
